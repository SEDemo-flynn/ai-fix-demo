name: FedRAMP Remediation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run FedRAMP Remediation Agent
        uses: CheckmarxDev/fedramp-remediation-agent@main
        with:
          jira_base_url: ${{ secrets.JIRA_BASE_URL }}
          jira_email: ${{ secrets.JIRA_EMAIL }}
          jira_apikey: ${{ secrets.JIRA_API_TOKEN }}
          aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

